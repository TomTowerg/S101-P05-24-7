name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    name: Lint, Typecheck and Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: supersecretsecretsecretsecretsecret123
      GOOGLE_CLIENT_ID: dummy-client-id
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      EMAIL_SERVER: smtp://user:password@smtp.example.com:587
      EMAIL_FROM: noreply@example.com
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy-vapid-public-key
      VAPID_PRIVATE_KEY: dummy-vapid-private-key
      VAPID_SUBJECT: mailto:dummy@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Run Linter
        run: bun run lint

      - name: Build Application
        run: bun run build
